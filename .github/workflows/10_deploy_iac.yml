name: 10 Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "bicep/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

    #   - name: Create Resource Group
    #     run: az group create --name 'rg-${{ vars.PROJECT_NAME }}' --location 'eastus2'

      - name: Deploy Bicep
        working-directory: bicep
        run: |
          az deployment group create \
            --name '${{ vars.PROJECT_NAME }}-dev' \
            --resource-group 'rg-${{ vars.PROJECT_NAME }}' \
            --template-file './main.bicep' \
            --parameters './main.bicepparam' \
            baseName='${{ vars.PROJECT_NAME_ABBR }}'
